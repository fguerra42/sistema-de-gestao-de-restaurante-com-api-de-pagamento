services:
  postgres:
    image: postgres:16-alpine
    container_name: parcelar-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Fi123456@
      POSTGRES_DB: restaurant
    ports:
      - "5433:5433"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: parcelar-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:Fi123456%40@postgres:5432/restaurant?schema=public
      - FRONTEND_URL=http://10.0.0.10:3007
      - NEXT_PUBLIC_API_URL=https://firminoguerra.loca.lt
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}

    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parcelar-frontend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://firminoguerra.loca.lt
      - PORT=3007
    depends_on:
      - backend

volumes:
  pgdata: 
  uploads: